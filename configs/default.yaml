app:
  name: locad-ad-simulator
  evaluator_version: v0.2.0
  default_panel: usa_gcc_balanced
  default_gate: standard
  default_mode: all
  output_root: runs
  reports_root: reports

scoring:
  dimensions:
    - relevance
    - pain_resonance
    - value_prop_alignment
    - trust
    - clarity
    - cta_pull
    - localization_fit
    - proof_sufficiency
  weights:
    relevance: 0.16
    pain_resonance: 0.16
    value_prop_alignment: 0.16
    trust: 0.14
    clarity: 0.12
    cta_pull: 0.10
    localization_fit: 0.08
    proof_sufficiency: 0.08

reporting:
  include_raw_evidence: true
  copy_latest_to_reports: true
